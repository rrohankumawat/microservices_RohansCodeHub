syntax = "proto3";

option csharp_namespace = "OrdersService.protos.v1";

package product.v1;

service ProductProtoService {

	rpc GetProductById (ProductRequest) returns (ProductResponse);

}


message ProductRequest {
	int32 productId = 1; 
}

message ProductResponse {
	int32 productId = 1;
	string name = 2;
	double price = 3;
}